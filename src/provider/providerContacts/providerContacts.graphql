type ProviderContact {
  id: String
  name: String
  contact: String
  type: ContactType
  provider: Provider
}

input ProviderContactInput {
  contact: String!
  name: String!
  type: ContactType!
  providerId: String!
}

type Mutation {
  createProviderContact(input: ProviderContactInput): ProviderContact
  updateProviderContact(
    id: String
    input: ProviderContactInput
  ): ProviderContact
  removeProviderContact(id: String): String
  restoreProviderContact(id: String): String
}
