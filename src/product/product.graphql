type Product {
  id: String!
  ref: String
  languages: [ProductLanguage]
  providers: [Provider]
  categories: [Category]
  productTypeId: String!
  type: ProductType
  price: Float
  prices: [ProductPrice]
  costPrices: [ProductProviderPrice]
  stock: [ProductStock]
}

type ProductLanguage {
  id: String
  title: String
  description: String
  companyLanguageId: String
}

type ProductPrice {
  id: String
  productId: String
  price: Float
  curency: CurrencyEnum
}

type ProductStock {
  id: String
  product: Product
  office: Office
  quantity: Int
}

type ProductResponsePaginated {
  products: [Product]
  totalCount: Int
}

input ProductInput {
  ref: String!
  companyId: String!
  productTypeId: String!
  languages: [ProductLanguagesInput]!
  providers: [ProductProviderInput]!
}

input ProductLanguagesInput {
  id: String
  title: String!
  description: String!
  productLanguagesInput: String!
}

input ProductProviderInput {
  id: String
  providerId: String!
}

input ProductListInput {
  companyId: String!
  providerId: String
  limit: Int
  offset: Int
  cursor: Int
  sortBy: String
  sortOrder: String
}

type Query {
  getProduct(id: String!): Product
  listProducts(input: ProductListInput): ProductResponsePaginated
}

type Mutation {
  createProduct(input: ProductInput!): Product
  updateProduct(id: String!, input: ProductInput!): Product
  removeProduct(id: String!, forceDelete: Boolean): String
  restoreProduct(id: String!): String

  updateProductPrice(id: String!, price: Float!): ProductPrice
}
