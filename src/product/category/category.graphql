type Category {
  id: String!
  names: [CategoryName]
  products: [Product]
}

type CategoryName {
  id: String
  ref: String
  name: String
  companyLanguageId: String
  language: Language
}

type CategoryResponsePaginated {
  categories: [Category]
  totalCount: Int
}

input CategoryInput {
  companyId: String!
  names: [CategoryNameInput!]!
}

input CategoryNameInput {
  name: String!
  productLanguagesInput: String!
}

input CategoryListInput {
  companyId: String!
  limit: Int
  offset: Int
  cursor: Int
  sortBy: String
  sortOrder: String
}

type Query {
  listCategories(input: CategoryListInput): CategoryResponsePaginated
}

type Mutation {
  createCategory(input: CategoryInput!): Category
  updateCategory(id: String!, input: CategoryInput!): Category
  removeCategory(id: String!, forceDelete: Boolean): String
  restoreCategory(id: String!): String
}
