type ProductType {
  id: String!
  names: [ProductTypeName]
  products: [Product]
}

type ProductTypeName {
  id: String
  name: String
  companyLanguageId: String
}

type ProductTypeResponsePaginated {
  types: [ProductType]
  totalCount: Int
}

input ProductTypeInput {
  companyId: String!
  names: [ProductTypeNameInput!]!
}

input ProductTypeNameInput {
  name: String!
  companyLanguageId: String!
}

input ProductTypeListInput {
  companyId: String!
  limit: Int
  offset: Int
  cursor: Int
  sortBy: String
  sortOrder: String
}

type Query {
  listProductTypes(input: ProductListInput): ProductTypeResponsePaginated
}

type Mutation {
  createProductType(input: ProductTypeInput!): ProductType
  updateProductType(id: String!, input: ProductTypeInput!): ProductType
  removeProductType(id: String!, forceDelete: Boolean): String
  restoreProductType(id: String!): String
}
