type UserContact {
  id: String!
  contact: String!
  user: User
  type: ContactType!
}

input UserContactInput {
  contact: String!
  type: ContactType!
  userId: String!
}

enum ContactType {
  Email
  Fax
  Mobile
  Phone
}

type Query {
  listContactTypes: [String]
}

type Mutation {
  createUserContact(input: UserContactInput!): UserContact
  updateUserContact(id: String!, input: UserContactInput!): UserContact
  removeUserContact(id: String!): String
}
