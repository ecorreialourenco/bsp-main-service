type User {
  id: String!
  firstName: String
  lastName: String
  userName: String
  isAdmin: Boolean
  isActive: Boolean
  address: String
  type: String
  city: String
  state: String
  country: String
  zipCode: String
  company: Company
  contacts: [UserContact]
  """
  role: UserRole
  """
  userCompanies: [UserCompany]
}

type UserCompany {
  id: String!
  employeeNr: Int
  userId: String!
  companyId: String!
}

input UserInput {
  firstName: String!
  lastName: String!
  userName: String!
  password: String!
  address: String
  city: String
  state: String
  country: String
  zipCode: String
  companyId: String!
}

input ListUsers {
  companyId: String!
  search: String
  userRoleId: String
  limit: Int
  offset: Int
  sortBy: String
  sortOrder: String
}

type UserResponsePaginated {
  users: [User]
  totalCount: Int
}

type UserResponse {
  user: User
  status: Int
}

type Query {
  getUser(id: String!): User
  listUsers(input: ListUsers): UserResponsePaginated
}

type Mutation {
  createUser(input: UserInput!): UserResponse!
  updateUser(id: String!, input: UserInput): UserResponse
  removeUser(id: String!, forceDelete: Boolean): String
  restoreUser(id: String!): String
  changeUserActiveStatus(id: String!, status: Boolean!): UserResponse
}

type Subscription {
  userStatusChanged: UserResponse
}
