type UserRole {
  id: String!
  userCompanyId: String
  roleId: String
  name: String
}

input NewUserRole {
  userCompanyId: String!
  roleId: String!
}

type Query {
  getUserRole(userCompanyId: String!): UserRole
}

type Mutation {
  createUserRole(input: NewUserRole!): UserRole!
  changeUserRole(userCompanyId: String!, roleId: String!): UserRole!
}

type Subscription {
  userRoleChanged(userCompanyId: String!): UserRole
}
