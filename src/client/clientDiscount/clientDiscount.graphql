type ClientDiscount {
  id: String
  companyClientRoleId: String
  percentage: Float
  categoryId: String
  productTypeId: String
}

type ClientDiscountPaginated {
  discounts: [ClientDiscount]
  totalCount: Int
}

input ListClientDiscountInput {
  companyClientRoleId: String!
  categoryId: String
  productTypeId: String
  limit: Int
  offset: Int
  cursor: Int
  sortBy: String
  sortOrder: String
}

input ClientDiscountInput {
  companyClientRoleId: String!
  percentage: Float!
  categoryId: String!
  productTypeId: String!
}

type Query {
  listClientDiscount(input: ListClientDiscountInput): ClientDiscountPaginated
}

type Mutation {
  createClientDiscount(input: ClientDiscountInput!): ClientDiscount
  updateClientDiscount(id: String!, input: ClientDiscountInput!): ClientDiscount
  removeClientDiscount(id: String!, forceDelete: Boolean): String
  restoreClientDiscount(id: String!): String
}
