type ClientContact {
  id: String
  contact: String
  type: ContactType
  name: String
  client: Client
}

input ClientContactInput {
  contact: String!
  name: String!
  type: ContactType!
  clientId: String!
}

type Mutation {
  createClientContact(input: ClientContactInput!): ClientContact
  updateClientContact(id: String!, input: ClientContactInput!): ClientContact
  removeClientContact(id: String!, forceDelete: Boolean): String
  restoreClientContact(id: String!): String
}
