type CompanyRole {
  id: String!
  name: String!
  minWages: Float
  maxWages: Float
  employeeCount: Int
  permissions: [CompanyPermission]
}

input CompanyRoleInput {
  name: String!
  minWages: Float!
  maxWages: Float!
  companyId: String!
}

input UpdateCompanyRoleInput {
  name: String!
  minWages: Float!
  maxWages: Float!
}

type CompanyRolesResponsePaginated {
  roles: [CompanyRole]
  totalCount: Int
}

input ListCompanyRolesInput {
  companyId: String!
  search: String
  limit: Int
  offset: Int
  cursor: Int
  sortBy: String
  sortOrder: String
}

type Query {
  listCompanyRoles(input: ListCompanyRolesInput): CompanyRolesResponsePaginated
}

type Mutation {
  createCompanyRole(input: CompanyRoleInput!): CompanyRole
  updateCompanyRole(id: String!, input: UpdateCompanyRoleInput!): CompanyRole
  deleteCompanyRole(id: String!): String
}
