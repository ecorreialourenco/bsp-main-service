type CompanyPermission {
  id: String!
  read: Boolean!
  create: Boolean!
  update: Boolean!
  delete: Boolean!
  roleId: String!
  menuId: String!
  menu: Menu
}

input CompanyPermissionMenuInput {
  menuId: String!
  read: Boolean
  create: Boolean!
  update: Boolean!
  delete: Boolean
}

input UpdateCompanyPermissions {
  id: String!
  input: CompanyPermissionMenuInput!
}

type Mutation {
  updatePermissions(input: [UpdateCompanyPermissions]!): [CompanyPermission]
  removePermissions(roleId: String): String
}
