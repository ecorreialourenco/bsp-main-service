type CompanyLanguages {
  id: String!
  companyId: String!
  languageId: String!
  isDefault: Boolean
  name: String
}

input CompanyLanguagesInput {
  companyId: String!
  languageId: String!
  isDefault: Boolean!
}

input UpdateCompanyLanguagesInput {
  isDefault: Boolean!
}

type CompanyLanguagesResponsePaginated {
  languages: [CompanyLanguages]
  totalCount: Int
}

type Query {
  listCompanyLanguages(companyId: String!): CompanyLanguagesResponsePaginated
}

type Mutation {
  createCompanyLanguages(input: CompanyLanguagesInput!): CompanyLanguages
  updateCompanyLanguages(
    id: String!
    input: UpdateCompanyLanguagesInput!
  ): CompanyLanguages
  deleteCompanyLanguages(id: String!): String
}
